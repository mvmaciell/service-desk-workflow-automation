# ---------------------------------------------------------------------------
# Allocation rules
# ---------------------------------------------------------------------------
[allocation]
enabled = true

strategy_order = ["skill_match", "current_load", "historical_load", "alphabetical"]
max_suggestions = 3

# Status NOVO — quais status indicam chamado novo na fila
novo_status_labels = ["Novo"]

# Status de conclusao (fechamento do chamado)
completion_status_labels = ["Fechado", "Resolvido", "Cancelado"]

# Status que indicam retorno ao desenvolvedor
return_to_developer_labels = ["Não Homologado", "Revisão"]

# Timeout de aprovacao (minutos) antes de registrar alerta
approval_timeout_minutes = 60

# Limite maximo de chamados novos por ciclo para enviar sugestoes.
max_new_tickets_per_cycle = 10
