name: CI

on:
  push:
    branches: ["main", "Claudemvmaciell/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy (strict on domain/ and ports/)
        run: |
          mypy src/megahub_monitor/domain/ src/megahub_monitor/ports/ \
               --strict \
               --ignore-missing-imports \
               --python-version 3.11

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest (unit tests only, with coverage)
        run: |
          pytest -m "not e2e" \
                 --cov=src/megahub_monitor \
                 --cov-report=term-missing \
                 --cov-fail-under=65 \
                 -q
